# models/marts/marts.yml

version: 2

models:
  - name: fct_trips
    description: >
      Core fact table. One row per taxi trip.
      Incrementally updated daily. Partitioned by pickup_date,
      clustered by time_of_day and payment_method for query efficiency.

    columns:
      - name: trip_key
        description: "Surrogate key — unique identifier for each trip."
        tests:
          - unique
          - not_null

      - name: pickup_date
        tests:
          - not_null

      - name: time_of_day
        tests:
          - not_null
          - accepted_values:
              values: ['morning_rush', 'midday', 'evening_rush', 'evening', 'overnight']

      - name: day_type
        tests:
          - not_null
          - accepted_values:
              values: ['weekday', 'weekend']

      - name: payment_method
        tests:
          - accepted_values:
              values: ['credit_card', 'cash', 'no_charge', 'dispute', 'other']

      - name: total_amount
        tests:
          - not_null

  - name: dim_time_of_day
    description: "Lookup table for time-of-day categories and sort order."
    columns:
      - name: time_of_day
        tests:
          - unique
          - not_null
  
  - name: dim_pickup_zones
    description: "NYC taxi zone lookup table. Joins to fct_trips on pickup_location_id and dropoff_location_id."
    columns:
      - name: zone_id
        description: "Unique zone identifier. Foreign key to fct_trips.pickup_location_id and dropoff_location_id."
        tests:
          - unique
          - not_null
      - name: zone_name
        description: "Human readable zone name e.g. JFK Airport, Times Square."
        tests:
          - not_null
      - name: borough
        description: "NYC borough the zone belongs to."
        tests:
          - not_null
          - accepted_values:
              values: ['Manhattan', 'Brooklyn', 'Queens', 'Bronx', 'Staten Island', 'EWR']
      - name: borough_region
        tests:
          - not_null
          - accepted_values:
              values: ['core', 'outer', 'unknown']